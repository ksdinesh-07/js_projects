<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>currency convertor</title>
  <link rel="stylesheet" href="currency_convertor.css">
  <link rel="icon" href="icon.png">
</head>
<body>

  <div class="container">
    <h1>Currency convertor</h1>

    <div class="box">

      <div class="left-box">
        <select class="from_currency" name="currency"></select>
        <input type="number" name="" id="input">
      </div>

      <div class="right-box">
        <select class="to_currency" name="currency"></select>
        <input type="number" name="" id="result">
      </div>

    </div>

    <div class="btn">
      <button id="btn">Convert</button>
    </div>

  </div>

  <script src="currency_convertor.js"></script>
</body>
</html>
